name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    name: JVM unit tests (Robolectric + Turbine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aprende
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run debug unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

  content-vetting-gate:
    name: Content vetting gate (C5 / §4.6 / AC17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aprende
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # The build of the vetted sample must succeed (exit 0)...
      - name: Build content.db from vetted sources
        run: python3 tools/content-pipeline/build_content_db.py --out app/src/main/assets/database/content.db
      # ...and the publish gate MUST reject an unvetted row (exit 2 = AC17).
      - name: Assert the gate rejects unvetted content
        run: |
          if python3 tools/content-pipeline/build_content_db.py --out /tmp/should_not_build.db --inject-unvetted; then
            echo "FAIL: the vetting gate accepted an UNVETTED row (AC17 violated)"; exit 1
          else
            echo "OK: vetting gate rejected unvetted content as required (AC17)"
          fi

  instrumented-tests:
    name: Instrumented E2E (AC1 airplane-mode lesson, AC12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aprende
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # The bundled content.db asset is gitignored; AC1 reads it via createFromAsset, so build it first.
      - name: Generate content.db asset
        run: python3 tools/content-pipeline/build_content_db.py --out app/src/main/assets/database/content.db
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          working-directory: aprende
          script: ./gradlew connectedDebugAndroidTest --stacktrace
